name: unigrok

services:
  grok-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${UNIGROK_IMAGE:-unigrok:1.1.0}
    container_name: unigrok
    ports:
      - "127.0.0.1:${UNIGROK_PORT:-4765}:8080"
    # Ground keys: inject ONLY XAI_API_KEY via compose --env-file (host SoT), not full env dump.
    environment:
      UNIGROK_HOST: 0.0.0.0
      PORT: 8080
      # Factory: all chat/agent tools on all the time
      UNIGROK_CHAT_TOOLS: ${UNIGROK_CHAT_TOOLS:-always}
      UNIGROK_SWARM: ${UNIGROK_SWARM:-active}
      UNIGROK_DEFAULT_LEVEL: ${UNIGROK_DEFAULT_LEVEL:-max}
      UNIGROK_AUTH_PATH: /home/appuser/.grok/auth.json
      UNIGROK_BUILD_TIMEOUT: ${UNIGROK_BUILD_TIMEOUT:-120}
      UNIGROK_API_TIMEOUT: ${UNIGROK_API_TIMEOUT:-120}
      UNIGROK_BREAKER_FAILURES: ${UNIGROK_BREAKER_FAILURES:-3}
      UNIGROK_BREAKER_COOLDOWN: ${UNIGROK_BREAKER_COOLDOWN:-30}
      # Live Docker defaults: autonomy + mission v2 on (override via .env).
      UNIGROK_AUTONOMY: ${UNIGROK_AUTONOMY:-true}
      UNIGROK_MISSION_V2: ${UNIGROK_MISSION_V2:-true}
      UNIGROK_MISSION_ENVELOPE_VERSION: ${UNIGROK_MISSION_ENVELOPE_VERSION:-1}
      UNIGROK_MISSION_LEASE_TTL: ${UNIGROK_MISSION_LEASE_TTL:-180}
      UNIGROK_TASK_CLASS: ${UNIGROK_TASK_CLASS:-true}
      UNIGROK_VERIFY_LITERAL: ${UNIGROK_VERIFY_LITERAL:-true}
      # Per-turn context pack: inventory → persona votes → lead merge (cpu default).
      UNIGROK_CONTEXT_PACK: ${UNIGROK_CONTEXT_PACK:-cpu}
      UNIGROK_API_MAX_INFLIGHT: ${UNIGROK_API_MAX_INFLIGHT:-4}
      UNIGROK_API_MAX_FILE_INFLIGHT: ${UNIGROK_API_MAX_FILE_INFLIGHT:-2}
      UNIGROK_FILE_LIST_TIMEOUT: ${UNIGROK_FILE_LIST_TIMEOUT:-120}
      UNIGROK_FILE_IO_TIMEOUT: ${UNIGROK_FILE_IO_TIMEOUT:-60}
      UNIGROK_MEDIA_TIMEOUT: ${UNIGROK_MEDIA_TIMEOUT:-300}
      UNIGROK_FILE_CONTENT_MAX_BYTES: ${UNIGROK_FILE_CONTENT_MAX_BYTES:-2000000}
      UNIGROK_CATALOG_TTL: ${UNIGROK_CATALOG_TTL:-60}
      UNIGROK_AGENT_SYNC_WINDOW: ${UNIGROK_AGENT_SYNC_WINDOW:-16}
      UNIGROK_AGENT_MAX_TURNS: ${UNIGROK_AGENT_MAX_TURNS:-6}
      UNIGROK_ROUTER_MAX_OUTPUT_TOKENS: ${UNIGROK_ROUTER_MAX_OUTPUT_TOKENS:-256}
      UNIGROK_VOTE_MAX_OUTPUT: ${UNIGROK_VOTE_MAX_OUTPUT:-128}
      UNIGROK_STATE_PATH: /state/unigrok-public.db
      UNIGROK_STATE_RETENTION_HOURS: ${UNIGROK_STATE_RETENTION_HOURS:-24}
      UNIGROK_MAX_PROMPT_CHARS: ${UNIGROK_MAX_PROMPT_CHARS:-100000}
      UNIGROK_MAX_WORKSPACE_CONTEXT_CHARS: ${UNIGROK_MAX_WORKSPACE_CONTEXT_CHARS:-100000}
      UNIGROK_ENABLE_METERED_API: ${UNIGROK_ENABLE_METERED_API:-true}
      UNIGROK_API_MODEL: ${UNIGROK_API_MODEL:-}
      # Control Center tier nav: per-tier URLs win, host ports are the fallback.
      # Public navigation stays bound to canonical core even when this
      # container itself is a Forge rehearsal on another host port.
      UNIGROK_PUBLIC_PORT: ${UNIGROK_PUBLIC_PORT:-4765}
      UNIGROK_SKY_PORT: ${UNIGROK_SKY_PORT:-4768}
      UNIGROK_SPACE_PORT: ${UNIGROK_SPACE_PORT:-4769}
      UNIGROK_PUBLIC_URL: ${UNIGROK_PUBLIC_URL:-}
      UNIGROK_SKY_URL: ${UNIGROK_SKY_URL:-}
      UNIGROK_SPACE_URL: ${UNIGROK_SPACE_URL:-}
      # Forge-surface GitHub sign-in (device flow): public client id, never a secret.
      UNIGROK_SURFACE: ${UNIGROK_SURFACE:-public}
      # Forge's own loopback auth origin is independent from Public tier nav.
      UNIGROK_FORGE_PORT: ${UNIGROK_FORGE_PORT:-4766}
      UNIGROK_FORGE_URL: ${UNIGROK_FORGE_URL:-}
      UNIGROK_GITHUB_CLIENT_ID: ${UNIGROK_GITHUB_CLIENT_ID:-}
      UNIGROK_CONTRIBUTOR_LOGINS: ${UNIGROK_CONTRIBUTOR_LOGINS:-}
      UNIGROK_CONTRIBUTOR_TIER: ${UNIGROK_CONTRIBUTOR_TIER:-sky}
      UNIGROK_CONTROL_TOKEN_PATH: ${UNIGROK_CONTROL_TOKEN_PATH:-}
      UNIGROK_FORGE_SESSION_KEY_PATH: ${UNIGROK_FORGE_SESSION_KEY_PATH:-}
      UNIGROK_FORGE_SESSION_SECRET: ${UNIGROK_FORGE_SESSION_SECRET:-}
      # Inference key allowlist (first non-empty wins for XAI_API_KEY).
      # Never inject multi-provider C2 keys here.
      XAI_PLANE_API: ${XAI_PLANE_API:-}
      XAI_API_KEY_SKY_INFERENCE: ${XAI_API_KEY_SKY_INFERENCE:-}
      XAI_API_KEY_GROUND: ${XAI_API_KEY_GROUND:-}
      XAI_API_KEY_UNIGROK_GROUND: ${XAI_API_KEY_UNIGROK_GROUND:-}
      XAI_API_KEY: ${XAI_API_KEY:-${XAI_API_KEY_SKY_INFERENCE:-${XAI_API_KEY_GROUND:-${XAI_API_KEY_UNIGROK_GROUND:-}}}}
    volumes:
      - grok-cli-auth:/home/appuser/.grok
      - grok-public-state:/state
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m,uid=1000,gid=1000,mode=0700
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  grok-cli-auth:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${UNIGROK_IMAGE:-unigrok:1.1.0}
    profiles: ["auth"]
    command: ["grok", "login", "--device-auth"]
    environment:
      HOME: /home/appuser
      GROK_AUTH_PATH: /home/appuser/.grok/auth.json
    volumes:
      - grok-cli-auth:/home/appuser/.grok
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true

  # Explicit, default-off local-model helper. This is a separate MCP server and
  # is never selected by the public @grok routing or credential recovery path.
  gemmagrok-local:
    build:
      context: .
      dockerfile: Dockerfile
    image: unigrok:1.1.0
    profiles: ["offline"]
    command: ["/app/.venv/bin/python", "-m", "unigrok_public.gemmagrok_peer"]
    ports:
      - "127.0.0.1:${GEMMAGROK_PORT:-4777}:8080"
    environment:
      GEMMAGROK_HOST: 0.0.0.0
      GEMMAGROK_TRANSPORT: streamable-http
      PORT: 8080
      GEMMAGROK_RUNTIME_URL: http://host.docker.internal:${GEMMAGROK_RUNTIME_PORT:-8081}
      GEMMAGROK_MODEL_ID: ${GEMMAGROK_MODEL_ID:-}
      GEMMAGROK_TIMEOUT_SECONDS: ${GEMMAGROK_TIMEOUT_SECONDS:-120}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m,uid=1000,gid=1000,mode=0700
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    init: true
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

volumes:
  grok-cli-auth:
    name: unigrok-cli-auth
  grok-public-state:
    name: unigrok-public-state
