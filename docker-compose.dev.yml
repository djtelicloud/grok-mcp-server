# Contributor-only live-source service. It is intentionally separate from the
# stable service registered in IDEs. Start with:
#   ./scripts/forge-up
name: grok-mcp-dev

services:
  grok-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: grok-mcp:dev
    container_name: grok-mcp-dev
    working_dir: /app
    command: ["/app/.venv/bin/python", "-P", "/app/main.py", "--http"]
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec
      - /run:rw,nosuid,nodev,noexec
    ports:
      - "127.0.0.1:${UNIGROK_DEV_PORT:-4766}:8080"
    volumes:
      - .:/workspace:ro
      # Git metadata stays read-only but is mounted separately so linked
      # worktrees do not expose an unusable host-absolute .git pointer.
      - ${UNIGROK_FORGE_GIT_COMMON_DIR:-.git}:/git:ro
      - grok-mcp-dev-state:/state
      - grok-mcp-cli-auth:/home/appuser/.grok
    env_file:
      - path: ${UNIGROK_ENV_FILE:-.env}
        required: false
    environment:
      - UNIGROK_RUNTIME=http
      - PORT=8080
      - UNIGROK_SERVICE_MODE=contributor
      - UNIGROK_CONTRIBUTOR_MODE=1
      # Workspace mutation is intentionally unavailable while the host checkout
      # is mounted read-only; a future isolated writer must opt in explicitly.
      - UNIGROK_SWARM=off
      - ENABLE_GIT_WRITE=0
      - UNIGROK_SERVICE_ROOT=/app
      - WORKSPACE_ROOT=/workspace
      - GIT_DIR=${UNIGROK_FORGE_GIT_DIR:-/git}
      - GIT_WORK_TREE=/workspace
      - UNIGROK_STATE_DIR=/state
      - UNIGROK_TRUSTED_LOOPBACK_PROXY=1
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

volumes:
  grok-mcp-dev-state:
  grok-mcp-cli-auth:
    name: unigrok-cli-auth
