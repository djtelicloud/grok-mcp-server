services:
  grok-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: grok-mcp:latest
    container_name: grok-mcp-server
    working_dir: /app
    command: ["/app/.venv/bin/python", "-P", "/app/main.py", "--http"]
    read_only: true
    tmpfs:
      - /tmp:rw,nosuid,nodev,noexec
      - /run:rw,nosuid,nodev,noexec
    ports:
      # One stable, globally registered service for every local IDE/project.
      - "127.0.0.1:${UNIGROK_PORT:-4765}:8080"
    volumes:
      # Service state is independent from the source checkout and caller projects.
      - grok-mcp-state:/state
      # Machine-level CLI OAuth identity, isolated from projects and host CLI state.
      - grok-mcp-cli-auth:/home/appuser/.grok
    env_file:
      - path: ${UNIGROK_ENV_FILE:-.env}
        required: false
    environment:
      - UNIGROK_RUNTIME=http
      - PORT=8080
      - UNIGROK_SERVICE_MODE=stable
      - UNIGROK_CONTRIBUTOR_MODE=0
      - UNIGROK_SERVICE_ROOT=/app
      - UNIGROK_STATE_DIR=/state
      - WORKSPACE_ROOT=
      - UNIGROK_TRUSTED_LOOPBACK_PROXY=1
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Explicit one-time bootstrap; never starts during ordinary `compose up`.
  # Run: docker compose run --rm grok-cli-auth
  grok-cli-auth:
    profiles: ["auth"]
    build:
      context: .
      dockerfile: Dockerfile
    image: grok-mcp:latest
    user: "0:0"
    entrypoint: ["/bin/sh", "-lc"]
    command:
      - >-
        chown -R 1000:1000 /home/appuser/.grok &&
        exec setpriv --reuid=1000 --regid=1000 --clear-groups
        env -u XAI_API_KEY -u XAI_MANAGEMENT_API_KEY -u XAI_MANAGEMENT_KEY
        -u GROK_API_KEY
        -u OPENAI_API_KEY -u ANTHROPIC_API_KEY -u CLAUDE_API_KEY
        -u GEMINI_API_KEY -u GOOGLE_API_KEY
        -u CLAUDE_CODE_OAUTH_TOKEN -u GH_TOKEN -u GITHUB_TOKEN
        -u AWS_ACCESS_KEY_ID -u AWS_SECRET_ACCESS_KEY -u AWS_SESSION_TOKEN
        -u AZURE_CLIENT_SECRET -u AZURE_OPENAI_API_KEY
        -u NPM_TOKEN -u PYPI_API_TOKEN
        -u GOOGLE_APPLICATION_CREDENTIALS -u UNIGROK_API_KEYS
        -u UNIGROK_MCP_TOKEN_SECRET -u UNIGROK_CLIENT_TOKEN
        -u MCP_TOKEN_SECRET -u SSH_AUTH_SOCK -u DOCKER_AUTH_CONFIG
        grok login --device-auth
    volumes:
      - grok-mcp-cli-auth:/home/appuser/.grok
    stdin_open: true
    tty: true

volumes:
  grok-mcp-state:
  grok-mcp-cli-auth:
    name: unigrok-cli-auth
