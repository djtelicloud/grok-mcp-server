name: Supervisor Gate

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]
  check_run:
    types: [completed]
  status:

permissions:
  contents: read
  pull-requests: read
  checks: read
  statuses: write

jobs:
  evaluate:
    if: >-
      ${{
        github.event_name == 'pull_request_target' ||
        (github.event_name == 'check_run' && !contains(github.event.check_run.name, 'Supervisor Gate')) ||
        github.event_name == 'status'
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out the default-branch evaluator
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          persist-credentials: false

      - name: Resolve pull request
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PULL_REQUEST_NUMBER: ${{ github.event.pull_request.number }}
          CHECK_RUN_PULL_REQUESTS: ${{ toJson(github.event.check_run.pull_requests) }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${EVENT_NAME}" == "pull_request_target" ]]; then
            number="${PULL_REQUEST_NUMBER}"
          elif [[ "${EVENT_NAME}" == "status" ]]; then
            number="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" --jq '.[0].number // empty')"
          else
            number="$(jq -r '.[0].number // empty' <<< "${CHECK_RUN_PULL_REQUESTS}")"
          fi
          if [[ -n "${number}" ]]; then
            echo "number=${number}" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish risk-aware supervisor status
        if: steps.pr.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail
          python scripts/supervisor_approval.py \
            --repo "${REPOSITORY}" \
            --pr-number "${PR_NUMBER}" \
            --server-url "${SERVER_URL}"
