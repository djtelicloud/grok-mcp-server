name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  attribution:
    name: Human and agent attribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Verify bounded commit attribution
        env:
          ATTRIBUTION_BASE: ${{ github.event.pull_request.base.sha || github.event.before }}
          ATTRIBUTION_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
        run: >-
          python scripts/check_agent_attribution.py
          --base-ref "$ATTRIBUTION_BASE"
          --head "$ATTRIBUTION_HEAD"

  project-site:
    name: Project Site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites/unigrok-control-center

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: sites/unigrok-control-center/package-lock.json

      - name: Install Site dependencies
        run: npm ci

      - name: Audit Site dependencies
        run: npm audit --audit-level=moderate

      - name: Lint project Site
        run: npm run lint

      - name: Test provisioned Site deployment source
        run: npm run test:deployment

  control-cloudrun-image:
    name: Control Cloud Run Image
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sites/unigrok-control-center

    steps:
      - uses: actions/checkout@v7

      - name: Build standalone control image
        run: docker build --file Dockerfile.cloudrun --tag unigrok-control:ci .

      - name: Verify public container contract
        run: |
          docker run -d --name unigrok-control-ci \
            -p 127.0.0.1:18080:8080 \
            unigrok-control:ci
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18080/api/public/v1/project > /tmp/unigrok-control-project.json; then
              python -c "import json; data=json.load(open('/tmp/unigrok-control-project.json')); assert data['name'] == 'UniGrok'"
              test "$(docker inspect --format '{{.Config.User}}' unigrok-control-ci)" = "10001:10001"
              exit 0
            fi
            sleep 2
          done
          echo "control image never became ready" >&2
          docker logs unigrok-control-ci >&2
          exit 1

      - name: Verify GitHub mode fails closed without runtime configuration
        run: |
          if docker run --rm -e CONTROL_CENTER_MODE=github unigrok-control:ci; then
            echo "control image started with incomplete GitHub configuration" >&2
            exit 1
          else
            status=$?
          fi
          test "$status" -eq 78

      - name: Container cleanup
        if: always()
        run: docker rm -f unigrok-control-ci || true

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (including dev)
        run: uv sync --locked --dev

      - name: Byte-compile sources
        run: uv run python -m compileall -q src evals main.py

      - name: Import smoke test
        env:
          XAI_API_KEY: dummy-ci-key
        run: uv run python -c "import src.server; print('server import OK')"

      - name: Verify generated OKF bundle
        run: uv run python scripts/generate_okf.py --check

      - name: Run tests
        env:
          XAI_API_KEY: dummy-ci-key
        run: uv run pytest tests/ -v --tb=short

      - name: Build package artifacts
        if: matrix.python-version == '3.12'
        run: uv build

      - name: Verify wheel runtime assets
        if: matrix.python-version == '3.12'
        run: >-
          uv run python -c "import glob, zipfile;
          wheel=glob.glob('dist/*.whl')[0];
          names=set(zipfile.ZipFile(wheel).namelist());
          required={'mcp_ui/index.html','docs/okf/index.md','docs/okf/api-reference.md','.grok/prompts/grok_adapter.md','example.env'};
          missing=required-names;
          assert not missing, f'missing wheel assets: {sorted(missing)}'"

      - name: Verify bounded source distribution
        if: matrix.python-version == '3.12'
        run: >-
          uv run python -c "import glob, os, tarfile;
          archive=glob.glob('dist/*.tar.gz')[0];
          names=tarfile.open(archive, 'r:gz').getnames();
          forbidden=('node_modules/','/.sites-runtime/','/.next/','/.wrangler/','/__pycache__/');
          leaked=[name for name in names if any(marker in name for marker in forbidden)];
          assert not leaked, f'sdist contains generated/local files: {leaked[:20]}';
          assert os.path.getsize(archive) < 10*1024*1024, 'sdist exceeds 10 MiB';
          assert len(names) < 2000, f'sdist has suspicious entry count: {len(names)}'"

      - name: Static security scan
        if: matrix.python-version == '3.12'
        run: uvx bandit -r src -ll -q

      - name: pip-audit
        if: matrix.python-version == '3.12'
        run: |
          uv export --frozen --no-dev --no-emit-project --no-hashes --format requirements-txt > /tmp/requirements-audit.txt
          uvx pip-audit -r /tmp/requirements-audit.txt

  evals-offline:
    # Golden-task regression gate: offline cassette replay through the real
    # run_agent_turn/orchestrate stack (no network, no API key). Fails on any
    # regression against the expected-pass list in evals/baseline.json.
    # NEVER add --live here — the live tier calls the real xAI API.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (including dev)
        run: uv sync --locked --dev

      - name: Run offline evals against baseline
        env:
          XAI_API_KEY: dummy-ci-key
        run: uv run python -m evals run --check-baseline

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-report
          path: evals/out/report.json
          if-no-files-found: ignore

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t grok-mcp:ci .

      - name: Smoke test /healthz
        # Deliberately no UNIGROK_RUNTIME override: the bare image must be
        # reachable through the published port (the Dockerfile bakes
        # UNIGROK_HOST=0.0.0.0), so setting it here would mask a regression.
        run: |
          docker run -d --name grok-mcp-ci \
            -e XAI_API_KEY=dummy-ci-key \
            -e UNIGROK_API_KEYS=ci-client-key \
            -p 4765:8080 \
            grok-mcp:ci
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4765/healthz > /dev/null \
              && curl -fsS -H "Authorization: Bearer ci-client-key" \
                http://127.0.0.1:4765/docs/okf/api-reference.md > /dev/null; then
              echo "healthz and OKF API reference OK"
              exit 0
            fi
            sleep 2
          done
          echo "healthz never became ready" >&2
          docker logs grok-mcp-ci >&2
          exit 1

      - name: Container cleanup
        if: always()
        run: docker rm -f grok-mcp-ci || true
